  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --cream:#F3EDE2;--cream-deep:#EAE2D4;--parchment:#E8DFD0;
    --charcoal:#1C1915;--charcoal-soft:#302D26;
    --gold:#B8972A;--gold-light:#D4AE3C;--gold-muted:#9A7E22;
    --taupe:#8A8070;--taupe-light:#B4A898;--white:#FDFAF5;--green:#6B8C5A;
  }
  html,body{background:#1C1915;font-family:'Jost',sans-serif;color:#1C1915}
  input,textarea{outline:none;caret-color:var(--gold);font-family:'Jost',sans-serif}
  textarea::placeholder,input::placeholder{color:rgba(140,128,112,0.4)}
  button{font-family:'Jost',sans-serif}
  @keyframes fcFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:rgba(184,151,42,0.25)}
  ::-webkit-scrollbar-track{background:transparent}
  /* Photographic face slots — droppable hero portraits. Frame stays clean; the
     portrait src fills it so the empty drop-UI never shows at avatar sizes. */
  .fc-face image-slot::part(ring){display:none}
  .fc-face image-slot::part(frame){background:transparent}
</style>
<!-- standalone export: images referenced as strings in JS/JSX (not plain HTML attrs) -->
