<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fifth Circle — Manager Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#B8972A;--gold-light:#D4AE3C;--gold-muted:#9A7E22}
  html,body{background:#1C1915;font-family:'Jost',sans-serif;color:#1C1915}
  input,textarea{outline:none;caret-color:var(--gold);font-family:'Jost',sans-serif}
  input::placeholder{color:rgba(140,128,112,0.4)}
  button{font-family:'Jost',sans-serif}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:rgba(184,151,42,0.25)}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes fcToast{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
