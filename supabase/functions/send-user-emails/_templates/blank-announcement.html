<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light">
	<meta name="supported-color-schemes" content="light">
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body
    style="font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #0a0830;">
    <div
        style="max-width: 600px; margin: 28px auto; background: #121042; border: 1px solid rgba(167, 139, 250, 0.22); border-radius: 12px; overflow: hidden; box-shadow: 0 20px 45px rgba(2, 6, 23, 0.55);">
        <div
            style="background: linear-gradient(135deg, #111d7a 0%, #5b21d7 100%); padding: 40px 20px; text-align: center;">
            <img src="https://vlaqcfzmsjzgmzxodhkd.supabase.co/storage/v1/object/public/email-assets/orbiit-logo-email.png" alt="Orbiit" style="display:block; margin: 0 auto 14px auto; width: 132px; max-width: 45%; height: auto; border:0;">
      <h1 style="color: #ffffff !important; -webkit-text-fill-color: #ffffff; text-shadow: none; margin: 0; font-size: 28px;">{{subjectHeader}}</h1>
        </div>

        <div style="padding: 40px 30px;">
            <h2 style="color: #ffffff; font-size: 24px; margin-top: 0;">Hi {{firstName}},</h2>

            <div style="color: #e8e9ff; font-size: 16px; margin: 20px 0;">
                {{content}}
            </div>

            <div
                style="display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid rgba(198, 172, 255, 0.25); padding-top: 20px;">
                <p style="color: #e8e9ff; font-size: 14px;">
                    Orbiit Team
                </p>
                <img src="https://vlaqcfzmsjzgmzxodhkd.supabase.co/storage/v1/object/public/email-assets/orbiit-logo-email.png"
                    style="display: block; height: auto; border: 0; width: 50%; max-width: 150px;" width="150"
                    alt="Orbiit Logo">
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 20px; color: #b9bdd8; font-size: 12px;">
        <p>© {{year}} Orbiit. All rights reserved.</p>
    </div>
</body>

</html>
